<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>막창도둑 웨이팅</title>
</head>
<body>

  <h1>막창도둑 웨이팅 앱</h1>
  <p id="status">Firebase 연결 중...</p>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA1Yvnrp5aLoMkYsDK5luVByDVXnqTLi3E",
      authDomain: "qr-code-waiting.firebaseapp.com",
      projectId: "qr-code-waiting",
      storageBucket: "qr-code-waiting.firebasestorage.app",
      messagingSenderId: "464431670960",
      appId: "1:464431670960:web:2aaf2f8fb5b3e7ac107d75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const messaging = firebase.messaging();

    async function initPush() {
      try {
        const permission = await Notification.requestPermission();

        if (permission === "granted") {
          const token = await messaging.getToken({
            vapidKey: "BDLDmat93G0tg5I6zMDlufmFTHAdm0BLOqZ9Cz2mWxGT01Efq35xiDTYjhVC6xUVDNwclJs9CTg_bwSJQmYlpZA"
          });
          console.log("푸시 토큰:", token);
          document.getElementById("status").innerText = "알림 설정 완료!";
        } else {
          document.getElementById("status").innerText = "알림 권한이 거부됐습니다.";
        }
      } catch (error) {
        console.error("오류:", error);
        document.getElementById("status").innerText = "오류: " + error.message;
      }
    }

    messaging.onMessage((payload) => {
      alert("알림: " + payload.notification.title);
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("/firebase-messaging-sw.js")
        .then(() => {
          initPush();
        })
        .catch((err) => {
          console.error("서비스 워커 오류:", err);
        });
    }
  </script>

</body>
</html>
