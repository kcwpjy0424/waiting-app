<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>막창도둑 웨이팅</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }

    .header {
      background: #c0392b;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .header h1 { font-size: 22px; }
    .header p { font-size: 13px; margin-top: 5px; opacity: 0.85; }

    .card {
      background: white;
      margin: 20px 16px;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 16px;
      color: #333;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #c0392b;
    }

    .counter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .counter-label { font-size: 14px; color: #444; }

    .counter-box {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .counter-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #c0392b;
      background: white;
      color: #c0392b;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .counter-num {
      font-size: 18px;
      font-weight: bold;
      min-width: 24px;
      text-align: center;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    .checkbox-item input { width: auto; }

    .submit-btn {
      width: calc(100% - 32px);
      margin: 0 16px 30px;
      padding: 16px;
      background: #c0392b;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    .submit-btn:active { background: #a93226; }

    .success-box {
      display: none;
      background: white;
      margin: 20px 16px;
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .success-box .number {
      font-size: 60px;
      font-weight: bold;
      color: #c0392b;
    }

    .success-box p {
      font-size: 15px;
      color: #555;
      margin-top: 10px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🔥 막창도둑</h1>
    <p>웨이팅 등록</p>
  </div>

  <!-- 등록 폼 -->
  <div id="formArea">

    <div class="card">
      <h2>👤 기본 정보</h2>

      <div class="form-group">
        <label>이름</label>
        <input type="text" id="name" placeholder="예) 홍길동">
      </div>

      <div class="form-group">
        <label>전화번호</label>
        <input type="tel" id="phone" placeholder="예) 010-1234-5678">
      </div>
    </div>

    <div class="card">
      <h2>👥 인원 수</h2>

      <div class="counter-row">
        <span class="counter-label">성인</span>
        <div class="counter-box">
          <button class="counter-btn" onclick="change('adult', -1)">−</button>
          <span class="counter-num" id="adult">1</span>
          <button class="counter-btn" onclick="change('adult', 1)">+</button>
        </div>
      </div>

      <div class="counter-row">
        <span class="counter-label">아이 (12세 이하)</span>
        <div class="counter-box">
          <button class="counter-btn" onclick="change('child', -1)">−</button>
          <span class="counter-num" id="child">0</span>
          <button class="counter-btn" onclick="change('child', 1)">+</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>📝 요청사항</h2>

      <div class="form-group">
        <label>필요한 것을 선택하세요</label>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" value="테이블 2개"> 테이블 2개
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="테이블 3개"> 테이블 3개
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="유아의자"> 유아의자
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="단체석"> 단체석
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>기타 요청사항</label>
        <textarea id="memo" rows="3" placeholder="기타 요청사항을 입력하세요"></textarea>
      </div>
    </div>

    <button class="submit-btn" onclick="submitWaiting()">웨이팅 등록하기</button>

  </div>

  <!-- 등록 완료 화면 -->
  <div class="success-box" id="successArea">
    <div>🎉</div>
    <div class="number" id="waitingNumber">-</div>
    <p>번째 웨이팅이 등록되었습니다.<br>차례가 되면 알림을 보내드릴게요!</p>
    <p style="margin-top:16px; font-size:13px; color:#999;">
      알림을 받으려면 브라우저를 닫지 마세요.
    </p>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA1Yvnrp5aLoMkYsDK5luVByDVXnqTLi3E",
      authDomain: "qr-code-waiting.firebaseapp.com",
      projectId: "qr-code-waiting",
      storageBucket: "qr-code-waiting.firebasestorage.app",
      messagingSenderId: "464431670960",
      appId: "1:464431670960:web:2aaf2f8fb5b3e7ac107d75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const messaging = firebase.messaging();

    let pushToken = "";

    // 인원 수 카운터
    const counts = { adult: 1, child: 0 };

    function change(type, delta) {
      counts[type] = Math.max(0, counts[type] + delta);
      if (type === 'adult') counts[type] = Math.max(1, counts[type]);
      document.getElementById(type).innerText = counts[type];
    }

    // 푸시 알림 초기화
    async function initPush() {
      try {
        if (!("Notification" in window)) return;
        const permission = await Notification.requestPermission();
        if (permission === "granted") {
          pushToken = await messaging.getToken({
            vapidKey: "BDLDmat93G0tg5I6zMDlufmFTHAdm0BLOqZ9Cz2mWxGT01Efq35xiDTYjhVC6xUVDNwclJs9CTg_bwSJQmYlpZA"
          });
        }
      } catch (e) {
        console.error("푸시 오류:", e);
      }
    }

    // 웨이팅 등록
    async function submitWaiting() {
      alert("버튼 클릭됨!");
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const memo = document.getElementById("memo").value.trim();

      // 체크박스 선택 항목
      const checked = [...document.querySelectorAll(".checkbox-item input:checked")]
        .map(el => el.value);
      const requests = checked.join(", ") + (memo ? " / " + memo : "");

      if (!name) { alert("이름을 입력해주세요."); return; }
      if (!phone) { alert("전화번호를 입력해주세요."); return; }

      try {
        // 현재 대기 인원 수 확인
        const snapshot = await db.collection("waiting")
          .where("status", "==", "waiting")
          .get();
        const waitingNumber = snapshot.size + 1;

        // Firestore에 저장
        await db.collection("waiting").add({
          name: name,
          phone: phone,
          adult: counts.adult,
          child: counts.child,
          requests: requests,
          pushToken: pushToken,
          status: "waiting",
          number: waitingNumber,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // 완료 화면 표시
        document.getElementById("formArea").style.display = "none";
        document.getElementById("successArea").style.display = "block";
        document.getElementById("waitingNumber").innerText = waitingNumber;

      } catch (e) {
        alert("등록 중 오류가 발생했습니다. 다시 시도해주세요.");
        console.error(e);
      }
    }

    // 포그라운드 알림
    messaging.onMessage((payload) => {
      alert("📢 " + payload.notification.title + "\n" + payload.notification.body);
    });

    // 서비스 워커 등록
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("/firebase-messaging-sw.js")
        .then(() => { initPush(); })
        .catch((err) => { console.error("서비스 워커 오류:", err); });
    }
  </script>

</body>
</html>
