<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>막창도둑 수변공원점 웨이팅</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      color: #1a1a1a;
    }

    .header {
      padding: 48px 24px 32px;
      border-bottom: 1px solid #f0f0f0;
    }

    .header-sub {
      font-size: 12px;
      color: #999;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .header-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .header-desc {
      font-size: 13px;
      color: #aaa;
      margin-top: 6px;
    }

    .section {
      padding: 28px 24px;
      border-bottom: 1px solid #f5f5f5;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #999;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .phone-wrap {
      display: flex;
      align-items: center;
      gap: 0;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 8px;
    }

    .phone-prefix {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
      margin-right: 8px;
    }

    .phone-dash {
      font-size: 22px;
      color: #ccc;
      margin: 0 8px;
    }

    .phone-input {
      flex: 1;
      border: none;
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      letter-spacing: 3px;
      outline: none;
      background: transparent;
      padding: 0;
    }

    .phone-input::placeholder {
      color: #e0e0e0;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .counter-wrap {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .counter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .counter-name {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .counter-sub {
      font-size: 12px;
      color: #bbb;
      margin-top: 3px;
    }

    .counter-box {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .counter-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid #1a1a1a;
      background: white;
      color: #1a1a1a;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 400;
      line-height: 1;
      transition: all 0.15s;
    }

    .counter-btn:active {
      background: #1a1a1a;
      color: white;
    }

    .counter-num {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      min-width: 28px;
      text-align: center;
    }

    .submit-wrap {
      padding: 24px;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s;
    }

    .submit-btn:active { background: #333; }

    .success-wrap {
      display: none;
      padding: 60px 24px;
      text-align: center;
    }

    .success-number {
      font-size: 88px;
      font-weight: 800;
      color: #1a1a1a;
      line-height: 1;
      letter-spacing: -4px;
    }

    .success-unit {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin-top: 4px;
    }

    .success-divider {
      width: 40px;
      height: 2px;
      background: #1a1a1a;
      margin: 24px auto;
    }

    .success-msg {
      font-size: 15px;
      color: #666;
      line-height: 1.8;
    }

    .success-info {
      margin-top: 32px;
      padding: 16px 20px;
      background: #f8f8f8;
      border-radius: 10px;
      font-size: 14px;
      color: #555;
      line-height: 1.8;
      text-align: left;
    }

    .success-info span { display: block; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-sub">Waiting</div>
    <div class="header-title">막창도둑 수변공원점</div>
    <div class="header-desc">웨이팅 등록을 해주세요</div>
  </div>

  <div id="formArea">

    <div class="section">
      <div class="section-label">전화번호</div>
      <div class="phone-wrap">
        <span class="phone-prefix">010</span>
        <span class="phone-dash">—</span>
        <input class="phone-input" type="tel" id="phone1"
          maxlength="4" placeholder="0000"
          oninput="moveNext(this, 'phone2')">
        <span class="phone-dash">—</span>
        <input class="phone-input" type="tel" id="phone2"
          maxlength="4" placeholder="0000">
      </div>
    </div>

    <div class="section">
      <div class="section-label">인원 수</div>
      <div class="counter-wrap">

        <div class="counter-row">
          <div class="counter-info">
            <div class="counter-name">성인</div>
          </div>
          <div class="counter-box">
            <button class="counter-btn" onclick="change('adult', -1)">−</button>
            <span class="counter-num" id="adult">1</span>
            <button class="counter-btn" onclick="change('adult', 1)">+</button>
          </div>
        </div>

        <div class="counter-row">
          <div class="counter-info">
            <div class="counter-name">아이</div>
            <div class="counter-sub">12세 이하</div>
          </div>
          <div class="counter-box">
            <button class="counter-btn" onclick="change('child', -1)">−</button>
            <span class="counter-num" id="child">0</span>
            <button class="counter-btn" onclick="change('child', 1)">+</button>
          </div>
        </div>

      </div>
    </div>

    <div class="submit-wrap">
      <button class="submit-btn" onclick="submitWaiting()">웨이팅 등록</button>
    </div>

  </div>

  <div class="success-wrap" id="successArea">
    <div class="success-number" id="waitingNumber">-</div>
    <div class="success-unit">번째 웨이팅</div>
    <div class="success-divider"></div>
    <div class="success-msg">
      차례가 되면 연락드리겠습니다.<br>
      잠시만 기다려 주세요.
    </div>
    <div class="success-info" id="successInfo"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA1Yvnrp5aLoMkYsDK5luVByDVXnqTLi3E",
      authDomain: "qr-code-waiting.firebaseapp.com",
      projectId: "qr-code-waiting",
      storageBucket: "qr-code-waiting.firebasestorage.app",
      messagingSenderId: "464431670960",
      appId: "1:464431670960:web:2aaf2f8fb5b3e7ac107d75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const messaging = firebase.messaging();

    let pushToken = "";
    const counts = { adult: 1, child: 0 };

    // ★ 구글 시트 URL (마케팅 데이터 저장)
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxgngzmg6rhm5wSoZYXN0G8E94LxTtPEY70vpCxLgqubBHrRoh7nKjtfdk-sRawnwPQ/exec";

    function moveNext(el, nextId) {
      if (el.value.length === 4) {
        document.getElementById(nextId).focus();
      }
    }

    function change(type, delta) {
      counts[type] = Math.max(0, counts[type] + delta);
      if (type === 'adult') counts[type] = Math.max(1, counts[type]);
      document.getElementById(type).innerText = counts[type];
    }

    async function initPush() {
      try {
        if (!("Notification" in window)) return;
        const permission = await Notification.requestPermission();
        if (permission === "granted") {
          pushToken = await messaging.getToken({
            vapidKey: "BDLDmat93G0tg5I6zMDlufmFTHAdm0BLOqZ9Cz2mWxGT01Efq35xiDTYjhVC6xUVDNwclJs9CTg_bwSJQmYlpZA"
          });
        }
      } catch (e) {
        console.error("푸시 오류:", e);
      }
    }

    // ★ 구글 시트에 마케팅 데이터 저장
    async function saveToSheet(phone, adult, child) {
      try {
        const today = new Date().toLocaleDateString('ko-KR', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        });
        await fetch(SHEET_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            date: today,
            phone: phone,
            adult: adult,
            child: child
          })
        });
      } catch(e) {
        console.error('시트 저장 오류:', e);
        // 시트 저장 실패해도 웨이팅 등록은 정상 진행
      }
    }

    async function submitWaiting() {
      const phone1 = document.getElementById("phone1").value.trim();
      const phone2 = document.getElementById("phone2").value.trim();

      if (phone1.length !== 4 || phone2.length !== 4) {
        alert("전화번호를 모두 입력해주세요.");
        return;
      }

      const fullPhone = "010-" + phone1 + "-" + phone2;

      try {
        const snapshot = await db.collection("waiting")
          .where("status", "==", "waiting")
          .get();
        const waitingNumber = snapshot.size + 1;

        // Firebase에 웨이팅 등록
        await db.collection("waiting").add({
          phone: fullPhone,
          adult: counts.adult,
          child: counts.child,
          pushToken: pushToken,
          status: "waiting",
          number: waitingNumber,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // ★ 구글 시트에 마케팅 데이터 저장 (백그라운드로 실행)
        saveToSheet(fullPhone, counts.adult, counts.child);

        document.getElementById("formArea").style.display = "none";
        document.getElementById("successArea").style.display = "block";
        document.getElementById("waitingNumber").innerText = waitingNumber;
        document.getElementById("successInfo").innerHTML =
          "<span>📞 " + fullPhone + "</span>" +
          "<span>👥 성인 " + counts.adult + "명" +
          (counts.child > 0 ? " / 아이 " + counts.child + "명" : "") + "</span>";

      } catch (e) {
        alert("등록 중 오류가 발생했습니다. 다시 시도해주세요.");
        console.error(e);
      }
    }

    messaging.onMessage((payload) => {
      alert("📢 " + payload.notification.title + "\n" + payload.notification.body);
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("/firebase-messaging-sw.js")
        .then(() => { initPush(); })
        .catch((err) => { console.error("서비스 워커 오류:", err); });
    }
  </script>

</body>
</html>
